<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>LL Shop</h1>
                <p>Crie sua conta</p>
            </div>
            <form method="post" action="CadastrarServlet" class="form-card">
                <div class="form-group">
                    <label>Nome completo:</label>
                    <input type="text" name="nome" required autocomplete="name" placeholder="Seu nome completo">
                </div>
                <div class="form-group">
                    <label>Email de login:</label>
                    <input type="email" name="login" required autocomplete="username" placeholder="seu@exemplo.com">
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" name="senha" required autocomplete="new-password" minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label>Telefone:</label>
                    <input type="tel" name="telefone" required autocomplete="tel" pattern="\(?\d{2}\)?\s?\d{4,5}-?\d{4}" placeholder="(21)98765-4321">
                </div>
                <div class="form-note">Telefone válido no formato (xx)xxxxx-xxxx.</div>
                <button class="botao botao-large" type="submit">Cadastrar</button>
            </form>
            <mensagem>
                <p>Já tem conta? <a href="LoginServlet" target="_parent">Faça login aqui</a></p>
            </mensagem>
        </div>
    </div>
</body>
</html>
