<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>LL Shop</h1>
                <p>Entre na sua conta</p>
            </div>
            <form method="post" action="LoginServlet" class="form-card">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" name="login" required autocomplete="username" placeholder="seu@exemplo.com">
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" name="senha" required autocomplete="current-password" minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <button class="botao botao-large" type="submit">Entrar</button>
            </form>
            <mensagem>
                <p>Não tem cadastro? <a href="CadastrarServlet" target="_parent">Cadastre-se aqui</a></p>
            </mensagem>
        </div>
    </div>
</body>
</html>
