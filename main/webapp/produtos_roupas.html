<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Roupas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <painel>
        <h2> Roupas </h2>
        <table>
            <thead>
                <tr><th>Imagem</th><th>Produto</th><th>Preço</th><th>Comprar</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td><img class="produto-imagem" src="imagem/camisa.svg" alt="Camisa"></td>
                    <td>Camisa Polo<br>Algodão premium</td>
                    <td>R$ 89,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R001"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
                <tr>
                    <td><img class="produto-imagem" src="imagem/calca.svg" alt="Calça"></td>
                    <td>Calça Jeans<br>Corte moderno</td>
                    <td>R$ 149,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R002"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
                <tr>
                    <td><img class="produto-imagem" src="imagem/jaqueta.svg" alt="Jaqueta"></td>
                    <td>Jaqueta<br>Leve e confortável</td>
                    <td>R$ 219,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R003"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
                <tr>
                    <td><img class="produto-imagem" src="imagem/vestido.svg" alt="Vestido"></td>
                    <td>Vestido<br>Estampa exclusiva</td>
                    <td>R$ 129,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R004"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
                <tr>
                    <td><img class="produto-imagem" src="imagem/tenis.svg" alt="Tênis"></td>
                    <td>Tênis<br>Esportivo confortável</td>
                    <td>R$ 179,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R005"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
                <tr>
                    <td><img class="produto-imagem" src="imagem/bone.svg" alt="Boné"></td>
                    <td>Boné<br>Ajuste traseiro</td>
                    <td>R$ 49,90</td>
                    <td><form method="post" action="ComprarServlet" target="mainFrame"><input type="hidden" name="produtoId" value="R006"><input type="hidden" name="quantidade" value="1"><button class="botao" type="submit">Comprar</button></form></td>
                </tr>
            </tbody>
        </table>
    </painel>
</body>
</html>
